name: Metrics
on:
  # 每天午夜 0 点自动更新数据
  schedule: [{cron: "0 0 * * *"}]
  # 支持手动在 Actions 页面点击触发更新
  workflow_dispatch:
  # 当你往主分支推代码时也会触发
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Core & Engineering Metrics
        uses: lowlighter/metrics@latest
        with:
          # 刚刚在 Settings 里配置的 Secret 名字
          token: ${{ secrets.METRICS_TOKEN }}

          # 基础配置
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Guangzhou # 记得改成你的时区，确保编码作息图准确

          # 插件 1：详细的编程语言分析（包含你在私有仓库的投入）
          plugin_languages: yes
          plugin_languages_ignored: html, css, text, markdown # 忽略非逻辑语言，突出核心技术栈
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # 插件 2：编码作息与习惯分析（极炫酷，展示你更喜欢在上午、下午还是深夜敲代码）
          plugin_habits: yes
          plugin_habits_from: 100 # 分析最近 200 个事件
          plugin_habits_days: 7
          plugin_habits_facts: no
          plugin_habits_charts: yes

          # 插件 3：WakaTime 联动（如果你有在使用 WakaTime 记录 IDE 精确编写时长）
          # plugin_wakatime: yes
          # plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }} # 需要去 WakaTime 申请 Token

          # 插件 4：GitHub 官方成就徽章（如“极客”、“全栈”等，以更紧凑的视觉展示）
          plugin_achievements: yes
          plugin_achievements_threshold: B # 隐藏极低难度的成就，保持含金量
          plugin_achievements_secrets: no
          plugin_achievements_limit: 5